<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link
      rel="icon"
      href="{{ url_for('static', filename='favicon.svg') }}"
      type="image/svg"
    />
    <title>Admin login - Thinkobo</title>
  </head>

  <body class="min-h-screen bg-gradient-to-b from-white via-slate-50 to-slate-100 text-slate-900">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div class="absolute -top-24 left-1/2 h-72 w-72 -translate-x-1/2 rounded-full bg-indigo-500/15 blur-3xl"></div>
      <div class="absolute -bottom-24 right-12 h-72 w-72 rounded-full bg-emerald-500/10 blur-3xl"></div>
    </div>
    {% from "components/autobot.html" import autobot_banner %} {{ autobot_banner(autobot) }}

    <main class="mx-auto grid min-h-screen max-w-5xl place-items-center px-4 py-10">
      <section class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="flex items-center gap-3">
          <img
            src="{{ url_for('static', filename='favicon.svg') }}"
            alt="Thinkobo logo"
            class="h-10 w-10 rounded-2xl border border-slate-200 bg-white p-2"
          />
          <div>
            <h1 class="text-lg font-semibold tracking-tight">Admin</h1>
            <p class="text-sm text-slate-600">Sign in to manage reports and reviews.</p>
          </div>
        </div>

        <form method="post" action="/admin/login" class="mt-6 space-y-4">
          <div>
            <label for="password" class="text-sm font-medium text-slate-700">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none ring-indigo-600/30 focus:ring-4"
              placeholder="••••••••"
            />
          </div>

          {% if error %}
          <p class="text-sm text-rose-700">{{ error }}</p>
          {% endif %}

          <button
            type="submit"
            class="w-full rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700"
          >
            Login
          </button>

          <a href="/home" class="block text-center text-sm font-semibold text-slate-600 hover:text-slate-800">
            Back to Home
          </a>
        </form>
      </section>
    </main>
  </body>
</html>
