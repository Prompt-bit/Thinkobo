  <!-- antenna -->
  <line x1="50" y1="20" x2="50" y2="8" stroke="#4F46E5" stroke-width="4"/>
  <circle cx="50" cy="6" r="4" fill="#22C55E"/>

  <!-- thinking bubble -->
  <circle cx="75" cy="20" r="4" fill="#22C55E"/>
  <circle cx="85" cy="10" r="3" fill="#22C55E"/>

</svg>